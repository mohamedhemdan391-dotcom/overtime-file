  
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملف الساعات الاضافية الغير مضافة في برنامج الترو إن | Truein Missing Overtime File</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
background:#f2f2f2;
min-height:100vh;
}

.topbar{
height:12px;
background:#c62828;
width:100%;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
margin:25px 0;
}

.header h1{
color:#c62828;
font-size:30px;
font-weight:700;
margin-bottom:5px;
}

.header p{
color:#666;
font-size:18px;
}

.form-card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:700;
color:#333;
}

input,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
transition:.3s;
background:#fff;
}

input:focus,
textarea:focus{
outline:none;
border-color:#c62828;
box-shadow:0 0 0 4px rgba(198,40,40,.15);
}

textarea{
min-height:120px;
resize:vertical;
}

.submit-btn{
width:100%;
padding:16px;
background:#c62828;
color:#fff;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
background:#b71c1c;
}

.toast{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 30px;
border-radius:14px;
color:#fff;
font-size:18px;
font-weight:700;
text-align:center;
display:none;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,.25);
min-width:320px;
}

.error{
background:#d32f2f;
}

.success{
background:#2e7d32;
}

@media(max-width:768px){

.container{
padding:15px;
}

.header h1{
font-size:24px;
}

.header p{
font-size:16px;
}

input,
textarea,
button{
font-size:16px;
}
}
</style>
</head>

<body>

<div class="topbar"></div>

<div class="container">

<div class="header">
<h1>ملف الساعات الاضافية الغير مضافة في برنامج الترو إن</h1>
<p>Truein Missing Overtime File</p>
</div>

<div class="form-card">

<form id="overtimeForm">

<div class="form-group">
<label>اسم الموظف / Employee Name *</label>
<input type="text" id="employeeName">
</div>

<div class="form-group">
<label>رقم الموظف / Employee ID *</label>
<input type="text" id="employeeId">
</div>

<div class="form-group">
<label>المسمى الوظيفي / Job Title *</label>
<input type="text" id="jobTitle">
</div>

<div class="form-group">
<label>اسم الفرع / Branch Name *</label>
<input type="text" id="branchName">
</div>

<div class="form-group">
<label>تاريخ الساعات الإضافية / Overtime Date *</label>
<input type="date" id="overtimeDate">
</div>

<div class="form-group">
<label>عدد الساعات الإضافية / Overtime Hours *</label>
<input type="number" min="1" id="overtimeHours">
</div>

<div class="form-group">
<label>سبب الساعات الإضافية / Reason for Overtime *</label>
<textarea id="reason"></textarea>
</div>

<button type="submit" class="submit-btn">
إرسال الطلب / Submit Request
</button>

</form>

</div>

</div>

<div id="messageBox" class="toast"></div>

<script>

const form = document.getElementById("overtimeForm");
const messageBox = document.getElementById("messageBox");

function showMessage(message,type,time){

messageBox.className = "toast " + type;
messageBox.innerHTML = message;
messageBox.style.display = "block";

setTimeout(()=>{
messageBox.style.display = "none";
},time);

}

form.addEventListener("submit", async function(e){

e.preventDefault();

const employeeName = document.getElementById("employeeName").value.trim();
const employeeId = document.getElementById("employeeId").value.trim();
const jobTitle = document.getElementById("jobTitle").value.trim();
const branchName = document.getElementById("branchName").value.trim();
const overtimeDate = document.getElementById("overtimeDate").value.trim();
const overtimeHours = document.getElementById("overtimeHours").value.trim();
const reason = document.getElementById("reason").value.trim();

if(
!employeeName ||
!employeeId ||
!jobTitle ||
!branchName ||
!overtimeDate ||
!overtimeHours ||
!reason
){

showMessage(
"❌ يرجى استكمال جميع البيانات المطلوبة<br>Please Complete All Required Fields",
"error",
2000
);

return;
}

const formData = new FormData();

formData.append("entry.911055499", employeeName);
formData.append("entry.1152783291", employeeId);
formData.append("entry.1096110353", jobTitle);
formData.append("entry.103620843", branchName);
formData.append("entry.2055388770", overtimeDate);
formData.append("entry.2052129671", overtimeHours);
formData.append("entry.1884114872", reason);

try{

await fetch(
"https://docs.google.com/forms/d/e/1FAIpQLSdvFRh6MGPlMb5YGYnJ7xZRxP6MuR9-1YqXvcz7zD_01wj2Pg/formResponse",
{
method:"POST",
mode:"no-cors",
body:formData
}
);

showMessage(
"✅ تم إرسال الطلب بنجاح<br>Request Submitted Successfully",
"success",
1000
);

form.reset();

}catch(error){

showMessage(
"❌ حدث خطأ أثناء الإرسال",
"error",
2000
);

console.error(error);

}

});

</script>

</body>
</html>
